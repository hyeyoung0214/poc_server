name: Fetch & Analyze News

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"   # UTC 0·6·12·18시 (KST 9·15·21·3시)
  workflow_dispatch:               # GitHub UI에서 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news and analyze
        working-directory: scripts
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          git diff --staged --quiet || git commit -m "data: 뉴스 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
